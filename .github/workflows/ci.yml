name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven
      - name: Unit and Modulith tests
        run: mvn test -B
      - name: Integration tests
        run: mvn verify -Pintegration -B

  e2e:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Start stack
        run: docker compose -f docker-compose.yml -f docker-compose.e2e.yml up -d --build --wait
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: e2e/package-lock.json
      - name: Install Playwright
        working-directory: e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Run Playwright smoke tests
        working-directory: e2e
        env:
          BASE_URL: http://localhost:8095
        run: npm test
      - name: Stop stack
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.e2e.yml down -v
