# Local development overrides — run only PostgreSQL via Docker, app runs on host.
# Usage:
#   docker compose -f docker-compose.dev.yml up -d
#   mvn spring-boot:run -Dspring-boot.run.profiles=dev
services:
  postgres:
    image: postgres:17
    container_name: ai-chat-postgres-dev
    ports:
      - "5437:5432"
    environment:
      POSTGRES_DB: ai_chat
      POSTGRES_USER: ai_chat
      POSTGRES_PASSWORD: ai_chat
    volumes:
      - pgdata-dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_chat -d ai_chat"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata-dev:
