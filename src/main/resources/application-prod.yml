# Production profile — enable with SPRING_PROFILES_ACTIVE=prod
management:
  endpoint:
    health:
      show-details: never
      show-components: never
    prometheus:
      access: read_only
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
