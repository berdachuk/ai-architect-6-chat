<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${chat.name != null ? chat.name + ' — AI Chat' : 'AI Chat'}">AI Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/chat.css" rel="stylesheet">
</head>
<body>
<div class="container-fluid vh-100 d-flex flex-column p-0">
    <nav class="navbar navbar-light bg-light border-bottom px-3">
        <span class="navbar-brand mb-0">AI Chat</span>
        <button id="newChatBtn" type="button" class="btn btn-outline-primary btn-sm">+ New Chat</button>
    </nav>

    <div class="row flex-grow-1 g-0 overflow-hidden">
        <div class="col-md-3 col-lg-2 border-end bg-light d-flex flex-column" id="sidebar">
            <div class="chat-list flex-grow-1 overflow-auto p-2" id="chatList"></div>
            <div class="p-2 border-top" id="mcpPanel">
                <div class="d-flex justify-content-between align-items-center mb-1">
                    <strong class="small">MCP Tools</strong>
                    <span class="badge text-bg-secondary" id="mcpPanelStatus">—</span>
                </div>
                <div id="mcpConnectionList" class="mcp-connection-list small text-muted">Loading…</div>
            </div>
            <div class="p-2 border-top">
                <button id="deleteAllBtn" type="button" class="btn btn-outline-danger btn-sm w-100">
                    Delete All Chats
                </button>
            </div>
        </div>

        <div class="col d-flex flex-column">
            <div class="flex-grow-1 overflow-auto p-3" id="messagePanel"></div>

            <div id="agentPanel" class="border-top bg-light p-2 d-none">
                <div class="d-flex justify-content-between align-items-center">
                    <strong id="agentPanelTitle">Agent Progress</strong>
                    <button type="button" class="btn btn-sm btn-outline-secondary" id="toggleAgentPanel">−</button>
                </div>
                <div id="pipelineStages" class="pipeline-stages small mt-1"></div>
                <div id="agentActivityList" class="small mt-1"></div>
            </div>

            <div class="border-top p-3 bg-white">
                <div class="input-group">
                    <textarea id="composer" class="form-control" rows="2"
                              placeholder="Type your message... (Enter to send, Shift+Enter for newline)"></textarea>
                    <button id="sendBtn" type="button" class="btn btn-primary">Send</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    window.AICHAT_CONFIG = {
        userId: /*[[${userId}]]*/ 'anonymous',
        chatId: /*[[${chat.id}]]*/ '',
        agentId: /*[[${chat.agentId}]]*/ 'auto',
        oauth2LoginEnabled: /*[[${oauth2LoginEnabled}]]*/ false
    };
</script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.4/dist/purify.min.js"></script>
<script src="/js/main.js"></script>
<script src="/js/chat.js"></script>
</body>
</html>
